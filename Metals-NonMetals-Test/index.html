<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDCET Metals and Non-Metals Test</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        #quiz-container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        .question { font-size: 1.2rem; margin-bottom: 20px; color: #333; }
        .options-grid { display: grid; gap: 10px; }
        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: 0.3s;
        }
        .option-btn:hover { background-color: #f8f9fa; border-color: var(--primary); }
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--danger) !important; color: white; border-color: var(--danger); }
        #explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4fd;
            border-left: 5px solid #3498db;
            display: none;
        }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; }
        button.action-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            background: var(--primary);
            color: white;
            cursor: pointer;
        }
        #result-screen { display: none; text-align: center; }
        .result-item { margin: 10px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>DDCET: ધાતુઓ અને અધાતુઓ</h1>
    
    <div id="quiz-screen">
        <div class="stats">
            <span>પ્રશ્ન: <span id="q-num">1</span>/100</span>
            <span>સ્કોર: <span id="live-score">0</span></span>
        </div>
        
        <div class="question" id="question-text"></div>
        <div class="options-grid" id="options-container"></div>
        <div id="explanation"></div>

        <div class="nav-btns">
            <button class="action-btn" onclick="prevQuestion()">પાછળ</button>
            <button class="action-btn" id="submit-test-btn" style="background:#8e44ad; display:none;" onclick="showResults()">ટેસ્ટ સબમિટ કરો</button>
            <button class="action-btn" onclick="nextQuestion()">આગળ</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>ટેસ્ટ પરિણામ</h2>
        <div class="result-item">કુલ પ્રશ્નો: 100</div>
        <div class="result-item">પ્રયત્ન કરેલા: <span id="res-attempted"></span></div>
        <div class="result-item">સાચા જવાબ: <span id="res-correct"></span></div>
        <div class="result-item">ખોટા જવાબ: <span id="res-wrong"></span></div>
        <div class="result-item" style="font-size: 1.5rem; font-weight: bold;">ટકાવારી: <span id="res-percent"></span>%</div>
        <button class="action-btn" onclick="location.reload()" style="margin-top:20px;">ફરીથી પ્રયાસ કરો</button>
    </div>
</div>

<script>
    const questionBank = [
        {
            q: "નીચેનામાંથી કઈ ધાતુને ચપ્પુ વડે કાપી શકાય છે?",
            options: ["આયર્ન (લોખંડ)", "એલ્યુમિનિયમ", "સોડિયમ", "કોપર (તાંબુ)"],
            correct: 2,
            exp: "સોડિયમ અને પોટેશિયમ ખૂબ જ નરમ ધાતુઓ છે, જેને ચપ્પુ વડે સરળતાથી કાપી શકાય છે."
        },
        {
            q: "કઈ અધાતુ ચળકાટ ધરાવે છે?",
            options: ["સલ્ફર", "ફોસ્ફરસ", "આયોડિન", "કાર્બન"],
            correct: 2,
            exp: "સામાન્ય રીતે અધાતુઓ ઝાંખી હોય છે, પરંતુ આયોડિન એક એવી અધાતુ છે જે ધાતુ જેવો ચળકાટ ધરાવે છે."
        },
        {
            q: "ઓરડાના તાપમાને કઈ ધાતુ પ્રવાહી સ્વરૂપે હોય છે?",
            options: ["સોડિયમ", "મર્ક્યુરી (પારો)", "ગેલિયમ", "સીઝિયમ"],
            correct: 1,
            exp: "મર્ક્યુરી (પારો) એ એકમાત્ર ધાતુ છે જે ઓરડાના તાપમાને પ્રવાહી અવસ્થામાં જોવા મળે છે."
        },
        {
            q: "કઈ અધાતુ વિદ્યુતની સુવાહક છે?",
            options: ["હીરો", "ગ્રેફાઇટ", "સલ્ફર", "નાઇટ્રોજન"],
            correct: 1,
            exp: "ગ્રેફાઇટ એ કાર્બનનું અપરરૂપ છે જે અધાતુ હોવા છતાં વિદ્યુતનું વહન કરી શકે છે."
        },
        {
            q: "સૌથી વધુ તન્ય (ductile) ધાતુ કઈ છે?",
            options: ["ચાંદી", "એલ્યુમિનિયમ", "સોનું", "તાંબુ"],
            correct: 2,
            exp: "સોનું સૌથી વધુ તન્ય ધાતુ છે. 1 ગ્રામ સોનામાંથી આશરે 2 કિમી લાંબો તાર બનાવી શકાય છે."
        },
        {
            q: "એલ્યુમિનિયમના ઓક્સાઇડ કેવા પ્રકારના હોય છે?",
            options: ["એસિડિક", "બેઝિક", "તટસ્થ", "ઉભયગુણી (Amphoteric)"],
            correct: 3,
            exp: "એલ્યુમિનિયમ અને ઝિંક ઓક્સાઇડ ઉભયગુણી હોય છે, જે એસિડ અને બેઝ બંને સાથે પ્રક્રિયા કરે છે."
        },
        {
            q: "એક્વા રેજિયા (Aqua Regia) માં કયા એસિડનું મિશ્રણ હોય છે?",
            options: ["HCl અને HNO3 (3:1)", "HCl અને H2SO4 (3:1)", "HNO3 અને HCl (3:1)", "H2SO4 અને HNO3 (1:1)"],
            correct: 0,
            exp: "એક્વા રેજિયા એ સાંદ્ર HCl અને સાંદ્ર HNO3 નું 3:1 ના પ્રમાણનું તાજું મિશ્રણ છે."
        },
        {
            q: "ધાતુઓની સક્રિયતા શ્રેણીમાં સૌથી વધુ સક્રિય ધાતુ કઈ છે?",
            options: ["સોડિયમ", "કેલ્શિયમ", "પોટેશિયમ", "મેગ્નેશિયમ"],
            correct: 2,
            exp: "પોટેશિયમ (K) સક્રિયતા શ્રેણીમાં સૌથી ઉપર છે, તેથી તે સૌથી વધુ સક્રિય છે."
        },
        {
            q: "નીચેનામાંથી કઈ ધાતુ ઠંડા પાણી સાથે અત્યંત ઝડપી પ્રક્રિયા કરે છે?",
            options: ["મેગ્નેશિયમ", "એલ્યુમિનિયમ", "સોડિયમ", "આયર્ન"],
            correct: 2,
            exp: "સોડિયમ અને પોટેશિયમ ઠંડા પાણી સાથે વિસ્ફોટક પ્રક્રિયા કરે છે અને હાઇડ્રોજન વાયુ મુક્ત કરે છે."
        },
        {
            q: "લોખંડના કાટનું રાસાયણિક સૂત્ર શું છે?",
            options: ["Fe3O4", "Fe2O3.xH2O", "FeO", "FeCl3"],
            correct: 1,
            exp: "લોખંડ જ્યારે ભેજવાળી હવામાં હોય ત્યારે હાઇડ્રેટેડ આયર્ન ઓક્સાઇડ (કાટ) બનાવે છે."
        },
        {
            q: "સિન્નાબાર એ કઈ ધાતુની કાચી ધાતુ (Ore) છે?",
            options: ["તાંબુ", "પારો (Mercury)", "ઝિંક", "સીસું (Lead)"],
            correct: 1,
            exp: "સિન્નાબાર (HgS) એ મર્ક્યુરી (પારો) મેળવવા માટેની મુખ્ય કાચી ધાતુ છે."
        },
        {
            q: "કઈ ધાતુને કેરોસીનમાં રાખવામાં આવે છે?",
            options: ["સોડિયમ", "ગોલ્ડ", "સિલ્વર", "મેગ્નેશિયમ"],
            correct: 0,
            exp: "સોડિયમ અત્યંત સક્રિય હોવાથી હવામાંના ઓક્સિજન અને ભેજ સાથે પ્રક્રિયા ન કરે તે માટે તેને કેરોસીનમાં રખાય છે."
        },
        {
            q: "પિત્તળ (Brass) એ કઈ ધાતુઓનું મિશ્રણ છે?",
            options: ["Cu + Sn", "Cu + Zn", "Pb + Sn", "Fe + Ni"],
            correct: 1,
            exp: "પિત્તળ એ તાંબુ (Copper) અને જસત (Zinc) ની મિશ્ર ધાતુ છે."
        },
        {
            q: "બ્રોન્ઝ (કાંસું) માં કયા ઘટકો હોય છે?",
            options: ["Cu + Zn", "Cu + Sn", "Al + Mg", "Pb + Sn"],
            correct: 1,
            exp: "બ્રોન્ઝ એ તાંબુ (Copper) અને ટીન (Tin) નું મિશ્રણ છે."
        },
        {
            q: "સોલ્ડર (Solder) મિશ્ર ધાતુનો ઉપયોગ ક્યાં થાય છે?",
            options: ["વાસણો બનાવવા", "ઘરેણાં બનાવવા", "ઇલેક્ટ્રિક તારનું વેલ્ડિંગ કરવા", "રેલવે ટ્રેક જોડવા"],
            correct: 2,
            exp: "સોલ્ડરનું ગલનબિંદુ નીચું હોવાથી તેનો ઉપયોગ ઇલેક્ટ્રિકલ વાયરના સોલ્ડરિંગ માટે થાય છે."
        },
        {
            q: "થર્માઈટ પ્રક્રિયામાં કયો રિડક્શન કર્તા વપરાય છે?",
            options: ["કાર્બન", "હાઇડ્રોજન", "એલ્યુમિનિયમ પાવડર", "સોડિયમ"],
            correct: 2,
            exp: "થર્માઈટ પ્રક્રિયામાં આયર્ન ઓક્સાઇડનું રિડક્શન કરવા એલ્યુમિનિયમનો ઉપયોગ થાય છે."
        },
        {
            q: "ગેલવેનાઈઝેશન એટલે લોખંડ પર શાનું પડ ચઢાવવાની પ્રક્રિયા?",
            options: ["ટીન", "નિકલ", "ઝિંક (જસત)", "ક્રોમિયમ"],
            correct: 2,
            exp: "લોખંડને કાટથી બચાવવા તેના પર ઝિંકનું પાતળું પડ ચઢાવવાની પ્રક્રિયાને ગેલવેનાઈઝેશન કહે છે."
        },
        {
            q: "કઈ ધાતુ તેના પર ઓક્સાઇડના રક્ષણાત્મક પડને કારણે કાટ સામે પ્રતિરોધક છે?",
            options: ["આયર્ન", "એલ્યુમિનિયમ", "સોડિયમ", "પોટેશિયમ"],
            correct: 1,
            exp: "એલ્યુમિનિયમ હવાના સંપર્કમાં આવતા તેના પર Al2O3 નું પડ બનાવે છે જે તેને વધુ કાટ લાગતા અટકાવે છે."
        },
        {
            q: "તાંબાના વાસણો પર લીલા રંગનું પડ શાને કારણે જામી જાય છે?",
            options: ["CuSO4", "CuCO3.Cu(OH)2", "CuO", "CuCl2"],
            correct: 1,
            exp: "ભેજવાળી હવામાં તાંબુ પ્રક્રિયા કરીને બેઝિક કોપર કાર્બોનેટનું લીલું પડ બનાવે છે."
        },
        {
            q: "શુદ્ધ સોનું કેટલા કેરેટનું હોય છે?",

            correct: 2,
            exp: "શુદ્ધ સોનું 24 કેરેટનું હોય છે, પરંતુ તે નરમ હોવાથી ઘરેણાં માટે 22 કેરેટ વપરાય છે."
        },
        {
            q: "આયોનિક સંયોજનો કેવા દ્રાવકમાં દ્રાવ્ય હોય છે?",
            options: ["પેટ્રોલ", "કેરોસીન", "પાણી", "બેન્ઝીન"],
            correct: 2,
            exp: "આયોનિક સંયોજનો ધ્રુવીય હોવાથી પાણીમાં દ્રાવ્ય હોય છે પરંતુ કાર્બનિક દ્રાવકોમાં અદ્રાવ્ય હોય છે."
        },
        {
            q: "સ્ટેનલેસ સ્ટીલ શાનું મિશ્રણ છે?",

            correct: 1,
            exp: "લોખંડ સાથે નિકલ અને ક્રોમિયમ ભેળવવાથી સ્ટેનલેસ સ્ટીલ મળે છે જે કાટ લાગતું નથી."
        },
        {
            q: "નીચેનામાંથી કઈ ધાતુ હથેળી પર રાખતા પીગળી જાય છે?",
            options: ["સોડિયમ", "પોટેશિયમ", "ગેલિયમ અને સીઝિયમ", "મર્ક્યુરી"],
            correct: 2,
            exp: "ગેલિયમ અને સીઝિયમના ગલનબિંદુ ખૂબ નીચા હોવાથી શરીરની ગરમીથી તે પીગળી જાય છે."
        },
        {
            q: "સલ્ફાઈડ યુક્ત કાચી ધાતુને વધુ હવાની હાજરીમાં ગરમ કરવાની પદ્ધતિ કઈ છે?",
            options: ["કેલ્સીનેશન", "ભુંજન (Roasting)", "રિડક્શન", "વિદ્યુતવિભાજન"],
            correct: 1,
            exp: "સલ્ફાઈડ અયસ્કને ઓક્સાઇડમાં ફેરવવા હવાની હાજરીમાં ગરમ કરવાની પદ્ધતિને ભુંજન કહે છે."
        },

    let currentIdx = 0;
    let score = 0;
    let answered = new Array(100).fill(null);

    function displayQuestion() {
        const qData = questionBank[currentIdx];
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('question-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            
            if(answered[currentIdx] !== null) {
                btn.disabled = true;
                if(i === qData.correct) btn.classList.add('correct');
                if(i === answered[currentIdx] && i !== qData.correct) btn.classList.add('wrong');
            }
            container.appendChild(btn);
        });

        const expDiv = document.getElementById('explanation');
        if(answered[currentIdx] !== null) {
            expDiv.style.display = 'block';
            expDiv.innerText = "સમજૂતી: " + qData.exp;
        } else {
            expDiv.style.display = 'none';
        }

        // Show submit button on last question
        document.getElementById('submit-test-btn').style.display = (currentIdx === 99) ? 'block' : 'none';
    }

    function checkAnswer(choice) {
        if(answered[currentIdx] !== null) return;
        
        answered[currentIdx] = choice;
        if(choice === questionBank[currentIdx].correct) {
            score++;
            document.getElementById('live-score').innerText = score;
        }
        displayQuestion();
    }

    function nextQuestion() {
        if(currentIdx < questionBank.length - 1) {
            currentIdx++;
            displayQuestion();
        }
    }

    function prevQuestion() {
        if(currentIdx > 0) {
            currentIdx--;
            displayQuestion();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const attempted = answered.filter(a => a !== null).length;
        document.getElementById('res-attempted').innerText = attempted;
        document.getElementById('res-correct').innerText = score;
        document.getElementById('res-wrong').innerText = attempted - score;
        document.getElementById('res-percent').innerText = ((score / 100) * 100).toFixed(2);
    }

    // Initial Load
    displayQuestion();
</script>
