<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDCET Online Test: એકમો અને માપન</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        #timer-box {
            position: sticky;
            top: 10px;
            background: var(--primary-color);
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .question-card {
            margin-bottom: 40px;
            padding: 20px;
            border-left: 5px solid var(--secondary-color);
            background: #fafafa;
            border-radius: 0 8px 8px 0;
        }

        .options label {
            display: block;
            margin: 10px 0;
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .options label:hover {
            background: #eef7ff;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-submit:hover {
            background: #219150;
        }

        .result-section {
            display: none;
            text-align: center;
            padding: 30px;
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #e8f4fd;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #2c3e50;
            border: 1px dashed var(--secondary-color);
        }

        .correct { color: var(--success-color); font-weight: bold; }
        .wrong { color: var(--error-color); font-weight: bold; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DDCET Preparation: એકમો અને માપન</h1>
        <p>કુલ પ્રશ્નો: 50 | સમય: 60 મિનિટ | કુલ ગુણ: 50</p>
        <div id="timer-box">સમય બાકી: <span id="timer">60:00</span></div>
    </header>

    <form id="quiz-form">
        <div id="questions-container"></div>
        <button type="button" class="btn-submit" onclick="submitQuiz()">ટેસ્ટ સબમિટ કરો</button>
    </form>

    <div id="result" class="result-section">
        <h2>તમારું પરિણામ</h2>
        <p id="score-text" style="font-size: 1.5rem; font-weight: bold;"></p>
        <button class="btn-submit" onclick="location.reload()" style="background: var(--secondary-color);">ટેસ્ટ ફરીથી આપો</button>
    </div>
</div>

let timeLeft = 3600;
let timerId;

function initQuiz() {
    const container = document.getElementById('questions-container');
    quizData.forEach((data, index) => {
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <p><strong>પ્રશ્ન ${index + 1}:</strong> ${data.q}</p>
            <div class="options">
                ${data.o.map(opt => `
                    <label>
                        <input type="radio" name="q${index}" value="${opt}">
                        ${opt}
                    </label>
                `).join('')}
            </div>
            <div id="ex${index}" class="explanation">
                <strong>સાચો જવાબ: <span class="correct">${data.a}</span></strong><br>
                <em>સમજૂતી:</em> ${data.ex}
            </div>
        `;
        container.appendChild(div);
    });

    startTimer();
}

function startTimer() {
    timerId = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        
        if (timeLeft <= 0) {
            clearInterval(timerId);
            submitQuiz();
        }
    }, 1000);
}

function submitQuiz() {
    clearInterval(timerId);
    let score = 0;
    
    quizData.forEach((data, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const explanationDiv = document.getElementById(`ex${index}`);
        explanationDiv.style.display = 'block';

        if (selected) {
            if (selected.value === data.a) {
                score++;
                selected.parentElement.style.background = "#d4edda";
            } else {
                selected.parentElement.style.background = "#f8d7da";
            }
        }
        
        // Disable all inputs
        const options = document.getElementsByName(`q${index}`);
        options.forEach(opt => opt.disabled = true);
    });

    document.getElementById('quiz-form').style.opacity = "0.8";
    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    document.getElementById('score-text').innerText = `તમારો સ્કોર: ${score} / 50`;
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = initQuiz;
