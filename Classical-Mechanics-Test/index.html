}else{
document.getElementById("solution").innerHTML=
"<p class='wrong'>Wrong ❌</p>"+q.solution;
}

}

function nextQuestion(){

current++;

if(current<questions.length){
loadQuestion();
}
else{
document.getElementById("quiz").innerHTML="Test Finished";
document.getElementById("solution").innerHTML="";
}

}

loadQuestion();

</script>
